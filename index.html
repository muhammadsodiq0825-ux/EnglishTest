<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Dictionary Test App</title>
<link rel="icon" type="image/x-icon" href="favicon.ico?v=2">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#11131c;
  --bg-soft:#171a26;
  --panel:#1d2133;
  --panel-2:#242841;
  --line:rgba(255,255,255,0.08);
  --text:#eef0f7;
  --muted:#f7d707;
  --accent:#e8a33d;
  --accent-2:#f4c569;
  --good:#4caf7d;
  --bad:#e0605a;
  --b1:#3f8f52; --b2:#c1443a; --b3:#3170ad; --b4:#8f3f8c; --b5:#1f8079; --b6:#5b6478;
  --b7:#b0862f; --b8:#3f8f8f; --b9:#7a5ea8; --b10:#a3455a;
  --radius:14px;
  --shadow: 0 10px 30px rgba(0,0,0,0.35);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background-color: var(--bg);
  background-image:
    radial-gradient(1200px 600px at 70% -10%, rgba(232,163,61,0.08) 0%, transparent 60%),
    linear-gradient(rgba(10,11,17,0.30), rgba(10,11,17,0.60)),
    url("library-bg.jpg");
  background-size: auto, auto, cover;
  background-position: 0 0, 0 0, center center;
  background-repeat: no-repeat, no-repeat, no-repeat;
  background-attachment: scroll, scroll, fixed;
  color:var(--text);
  font-family:'Manrope',sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.display{font-family:'Fraunces',serif;letter-spacing:-0.01em;text-shadow:0 2px 8px rgba(0,0,0,0.6);}
button{font-family:inherit;}
a{color:inherit;}
::selection{background:var(--accent);color:#1a1a1a;}
.hidden{display:none !important;}
input,select,textarea{font-family:inherit;}

/* ---------- App shell ---------- */
#app{max-width:1020px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

header.topbar{
  position:sticky;top:0;z-index:20;
  width:100vw;
  margin-left:calc(50% - 50vw);
  display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
  padding:12px 18px;
  background:rgba(17,19,28,0.2);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}
.brand{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;flex-shrink:0;}
.brand-mark{
  width:34px;height:34px;border-radius:9px;
  background:linear-gradient(160deg,var(--accent),#c97a1f);
  display:flex;align-items:center;justify-content:center;
  font-family:'Fraunces',serif;font-weight:700;color:#1a1206;font-size:16px;
  box-shadow:0 4px 12px rgba(232,163,61,0.3);flex-shrink:0;overflow:hidden;
}
.brand-mark img{width:100%;height:100%;object-fit:cover;}
.brand-title{font-family:'Fraunces',serif;font-weight:600;font-size:17px;line-height:1.1;white-space:nowrap;}
.brand-sub{font-size:11px;color:var(--muted);white-space:nowrap;}

.search-wrap{flex:1;min-width:120px;max-width:340px;order:3;}
.search-wrap input{
  width:100%;padding:8px 12px 8px 32px;border-radius:9px;border:1px solid var(--line);
  background:var(--bg-soft);color:var(--text);font-size:13px;outline:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%239aa1ba' stroke-width='2'><circle cx='11' cy='11' r='7'/><line x1='21' y1='21' x2='16.65' y2='16.65'/></svg>");
  background-repeat:no-repeat;background-position:10px center;
}
.search-wrap input:focus{border-color:var(--accent);}

nav.tabs{display:flex;gap:4px;flex-shrink:0;order:4;}
nav.tabs button{
  background:none;border:none;color:var(--muted);
  padding:8px 10px;border-radius:8px;font-size:12.5px;font-weight:600;
  cursor:pointer;transition:.15s;white-space:nowrap;
}
nav.tabs button:hover{color:var(--text);background:var(--panel);}
nav.tabs button.active{color:var(--accent);background:var(--panel-2);}

.user-chip{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);flex-shrink:0;order:2;}
#userEmail{max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;}
.user-chip button{
  background:var(--panel);border:1px solid var(--line);color:var(--text);
  padding:6px 10px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap;
}
.user-chip button:hover{border-color:var(--accent);color:var(--accent);}

main{
  flex:1;padding:26px 22px 60px;
}

/* ---------- Auth ---------- */
.auth-wrap{max-width:400px;margin:6vh auto 0;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:32px 28px;box-shadow:var(--shadow);}
.auth-hero{text-align:center;margin-bottom:22px;}
.auth-hero .brand-mark{margin:0 auto 14px;width:52px;height:52px;font-size:24px;border-radius:14px;}
.auth-hero h1{font-size:22px;margin:0 0 6px;}
.auth-hero p{color:var(--muted);font-size:13.5px;margin:0;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600;}
.field input,.field select{width:100%;padding:11px 13px;border-radius:10px;border:1px solid var(--line);background:var(--bg-soft);color:var(--text);font-size:14px;outline:none;transition:.15s;}
.field input:focus,.field select:focus{border-color:var(--accent);}
.field .subhint{font-size:11px;color:var(--muted);margin-top:5px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 18px;border-radius:10px;border:none;cursor:pointer;font-weight:700;font-size:14px;transition:.15s;}
.btn-primary{background:linear-gradient(160deg,var(--accent-2),var(--accent));color:#1a1206;width:100%;}
.btn-primary:hover{filter:brightness(1.06);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;filter:none;}
.btn-ghost{background:var(--panel-2);color:var(--text);border:1px solid var(--line);width:100%;}
.btn-ghost:hover{border-color:var(--accent);}
.auth-switch{text-align:center;margin-top:16px;font-size:13px;color:var(--muted);}
.auth-switch span{color:var(--accent);cursor:pointer;font-weight:700;}
.auth-error{background:rgba(224,96,90,0.12);border:1px solid rgba(224,96,90,0.4);color:#ff9b96;padding:9px 12px;border-radius:8px;font-size:12.5px;margin-bottom:14px;}
.auth-divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--muted);font-size:12px;}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--line);}
.setup-note{margin-top:18px;font-size:11.5px;color:var(--muted);line-height:1.5;border-top:1px dashed var(--line);padding-top:12px;}
.setup-note code{background:var(--bg-soft);padding:1px 5px;border-radius:4px;}

/* ---------- Section headers ---------- */
.section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:8px;}
.section-head h1{font-size:24px;margin:0;}
.section-head .hint{color:var(--muted);font-size:13px;text-shadow:0 1px 6px rgba(0,0,0,0.7);}
.crumbs{color:var(--muted);font-size:12.5px;margin-bottom:6px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;text-shadow:0 1px 6px rgba(0,0,0,0.7);}
.crumbs span.link{cursor:pointer;color:var(--accent);font-weight:600;}

/* ---------- Bookshelf ---------- */
.shelf-intro{color:var(--muted);font-size:13.5px;margin:-6px 0 22px;max-width:60ch;text-shadow:0 1px 6px rgba(0,0,0,0.7);}
.shelf-group{margin-bottom:30px;}
.shelf-group-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.shelf-group-head .lg-icon{font-size:18px;}
.shelf-group-head h2{font-size:16px;margin:0;font-weight:700;}
.shelf-group-head .lg-count{font-size:11.5px;color:var(--muted);background:var(--panel);border:1px solid var(--line);padding:2px 9px;border-radius:20px;}
.shelf{display:flex;gap:14px;padding:26px 20px 40px;border-radius:var(--radius);overflow-x:auto;align-items:flex-end;position:relative;}
.shelf::before{
  content:'';
  position:absolute;
  left:6px;right:6px;bottom:22px;
  height:16px;
  background:linear-gradient(180deg, #a9773c 0%, #85582c 45%, #4e2f15 100%);
  border-radius:4px;
  box-shadow:
    inset 0 2px 0 rgba(255,255,255,0.18),
    inset 0 -4px 6px rgba(0,0,0,0.35),
    0 10px 20px rgba(0,0,0,0.5);
  z-index:0;
}
.shelf > *{position:relative;z-index:1;}
.spine{--bc:#666;flex:0 0 auto;width:88px;height:230px;border-radius:8px 8px 4px 4px;
  background:linear-gradient(100deg, var(--bc) 70%, color-mix(in srgb, var(--bc) 70%, black) 100%);
  box-shadow: inset 3px 0 0 rgba(255,255,255,0.18), inset -3px 0 0 rgba(0,0,0,0.25), 0 12px 18px rgba(0,0,0,0.4);
  position:relative;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:space-between;
  padding:14px 6px;color:#fff;transition:transform .18s ease, box-shadow .18s ease;transform-origin:bottom center;}
.spine:hover{transform:translateY(-10px) rotate(-1deg);box-shadow:0 20px 26px rgba(0,0,0,0.5);}
.spine .num{font-family:'Fraunces',serif;font-size:26px;font-weight:700;text-shadow:0 2px 4px rgba(0,0,0,0.35);}
.spine .label{writing-mode:vertical-rl;font-size:10.5px;letter-spacing:.03em;font-weight:700;opacity:.92;text-align:center;max-height:120px;overflow:hidden;text-overflow:ellipsis;}
.spine .prog{font-size:9.5px;background:rgba(0,0,0,0.28);padding:3px 6px;border-radius:20px;font-weight:700;}
.spine-progress{width:100%;height:4px;background:rgba(0,0,0,0.3);border-radius:4px;overflow:hidden;margin:4px 0;}
.spine-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2));}
.spine .owner-badge{position:absolute;top:6px;right:6px;font-size:11px;background:rgba(0,0,0,0.35);border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;}
.add-book-spine{--bc:#333;flex:0 0 auto;width:88px;height:230px;border-radius:8px 8px 4px 4px;border:2px dashed var(--line);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted);cursor:pointer;transition:.15s;background:rgba(255,255,255,0.02);}
.add-book-spine:hover{border-color:var(--accent);color:var(--accent);}
.add-book-spine .plus{font-size:28px;}
.add-book-spine span.t{font-size:10.5px;text-align:center;padding:0 8px;font-weight:700;}
.no-results{color:var(--muted);text-align:center;padding:40px;}

/* ---------- Units grid ---------- */
.units-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(74px,1fr));gap:10px;}
.unit-tile{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 6px;text-align:center;cursor:pointer;transition:.15s;font-weight:700;}
.unit-tile:hover{border-color:var(--accent);color:var(--accent);}
.unit-tile .u-label{font-size:10px;color:var(--muted);display:block;font-weight:600;margin-bottom:2px;}
.unit-tile .u-title{font-size:9px;color:var(--muted);margin-top:3px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
.unit-tile .u-score{margin-top:6px;font-size:10px;font-weight:800;padding:2px 7px;border-radius:20px;display:inline-block;}
.u-score.score-good{background:rgba(76,175,125,0.18);color:var(--good);}
.u-score.score-mid{background:rgba(232,163,61,0.18);color:var(--accent);}
.u-score.score-low{background:rgba(224,96,90,0.18);color:var(--bad);}
.book-progress-row{display:flex;align-items:center;gap:10px;margin-bottom:18px;font-size:12.5px;color:var(--muted);}
.book-progress-bar{flex:1;max-width:260px;height:7px;background:var(--panel);border-radius:6px;overflow:hidden;}
.book-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2));}

/* ---------- Unit / word list ---------- */
.unit-toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:18px;}
.seg{display:flex;background:var(--bg-soft);border-radius:9px;padding:3px;gap:2px;}
.seg button{background:none;border:none;color:var(--muted);padding:7px 11px;border-radius:7px;font-size:12.5px;font-weight:700;cursor:pointer;white-space:nowrap;}
.seg button.active{background:var(--panel-2);color:var(--accent);}
.btn-test{background:linear-gradient(160deg,var(--accent-2),var(--accent));color:#1a1206;border:none;padding:10px 18px;border-radius:9px;font-weight:800;cursor:pointer;font-size:13.5px;}
.btn-test:hover{filter:brightness(1.05);}

.word-list{display:flex;flex-direction:column;gap:8px;}
.word-row{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:13px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:.12s;}
.word-row:hover{border-color:rgba(232,163,61,0.4);}
.word-en{font-family:'Fraunces',serif;font-weight:600;font-size:16.5px;min-width:0;flex:1 1 160px;white-space:normal;word-break:break-word;line-height:1.3;}
.word-uz{color:var(--muted);font-size:14px;flex:1;min-width:0;filter:blur(5px);opacity:.6;transition:filter .2s, opacity .2s;user-select:none;}
.word-row.revealed .word-uz{filter:blur(0);opacity:1;user-select:text;}
.star-btn{background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted);padding:4px;line-height:1;flex-shrink:0;}
.star-btn.active{color:var(--accent);}
.star-btn:hover{color:var(--accent-2);}

/* ---------- Quiz ---------- */
.quiz-wrap{max-width:560px;margin:0 auto;}
.quiz-progress{height:6px;background:var(--panel);border-radius:6px;overflow:hidden;margin-bottom:22px;}
.quiz-progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2));transition:width .2s;}
.quiz-meta{display:flex;justify-content:space-between;gap:8px;color:var(--muted);font-size:12.5px;margin-bottom:10px;}
.quiz-meta span:first-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}
.quiz-meta span:last-child{flex-shrink:0;}
.quiz-question{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:34px 24px;text-align:center;margin-bottom:20px;}
.quiz-question .q-dir{font-size:11px;color:var(--accent);font-weight:800;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;}
.quiz-question .q-word{font-family:'Fraunces',serif;font-size:28px;font-weight:600;}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.q-option{background:var(--panel);border:1.5px solid var(--line);border-radius:11px;padding:14px 10px;text-align:center;cursor:pointer;font-size:14px;font-weight:600;transition:.12s;position:relative;}
.q-option .kbd{position:absolute;top:4px;left:6px;font-size:9.5px;color:var(--muted);background:var(--bg-soft);border:1px solid var(--line);border-radius:4px;width:14px;height:14px;display:flex;align-items:center;justify-content:center;}
.q-option:hover{border-color:var(--accent);}
.q-option.correct{background:rgba(76,175,125,0.18);border-color:var(--good);color:#a9e8c4;}
.q-option.wrong{background:rgba(224,96,90,0.18);border-color:var(--bad);color:#ffb3af;}
.q-option.disabled{pointer-events:none;opacity:.85;}
.quiz-next{display:flex;justify-content:center;margin-top:20px;}
.quiz-exit{text-align:center;margin-top:14px;}
.quiz-exit button{background:none;border:none;color:var(--muted);font-size:12.5px;cursor:pointer;text-decoration:underline;}
.kbd-hint{text-align:center;color:var(--muted);font-size:11.5px;margin-top:14px;}
.kbd-hint kbd{background:var(--panel-2);border:1px solid var(--line);border-radius:4px;padding:1px 6px;font-size:10.5px;}

/* ---------- Result ---------- */
.result-wrap{max-width:520px;margin:0 auto;text-align:center;}
.result-score{font-family:'Fraunces',serif;font-size:56px;font-weight:700;margin:10px 0 4px;background:linear-gradient(160deg,var(--accent-2),var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent;}
.result-label{color:var(--muted);font-size:14px;margin-bottom:26px;}
.result-list{text-align:left;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;margin-bottom:22px;}
.result-list h4{margin:0 0 10px;font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
.result-row{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13.5px;}
.result-row:last-child{border-bottom:none;}
.result-row .r-en{font-weight:700;}
.result-row .r-correct{color:var(--good);}
.result-actions{display:flex;gap:10px;}

/* ---------- Saved lists (difficult / mistakes) ---------- */
.saved-list{display:flex;flex-direction:column;gap:8px;}
.saved-row{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:11px 14px;}
.saved-top{display:flex;align-items:center;gap:8px;}
.saved-top .meta{font-size:10.5px;color:var(--muted);flex-shrink:0;}
.saved-top .word-en{flex:1;min-width:0;font-size:15px;filter:none;opacity:1;}
.saved-top .count-badge{font-size:10px;color:var(--accent);background:rgba(232,163,61,0.12);padding:2px 7px;border-radius:20px;flex-shrink:0;}
.saved-bottom{font-size:13.5px;color:var(--muted);margin-top:4px;padding-left:2px;}
.saved-row .remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:2px 4px;flex-shrink:0;margin-left:auto;}
.saved-row .remove:hover{color:var(--bad);}
.empty-state{text-align:center;padding:50px 20px;color:var(--muted);}
.empty-state .big{font-size:38px;margin-bottom:10px;}

/* ---------- Upload wizard ---------- */
.wizard-steps{display:flex;gap:8px;margin-bottom:20px;}
.wizard-steps .ws{flex:1;height:4px;border-radius:4px;background:var(--panel);}
.wizard-steps .ws.done{background:var(--accent);}
.wizard-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:22px;max-width:640px;margin:0 auto;}
.wizard-card h3{margin:0 0 4px;font-size:18px;}
.wizard-card .wc-hint{color:var(--muted);font-size:12.5px;margin-bottom:18px;}
.radio-row{display:flex;gap:10px;flex-wrap:wrap;}
.radio-opt{flex:1;min-width:140px;background:var(--bg-soft);border:1.5px solid var(--line);border-radius:10px;padding:12px;cursor:pointer;font-size:13px;}
.radio-opt.active{border-color:var(--accent);background:rgba(232,163,61,0.08);}
.radio-opt .ro-title{font-weight:700;margin-bottom:2px;}
.radio-opt .ro-sub{color:var(--muted);font-size:11.5px;}
.recommend-tag{font-size:10px;background:var(--accent);color:#1a1206;padding:1px 7px;border-radius:20px;font-weight:800;margin-left:6px;}
.raw-textarea{width:100%;min-height:320px;background:var(--bg-soft);border:1px solid var(--line);border-radius:10px;color:var(--text);padding:14px;font-family:'Courier New',monospace;font-size:13px;line-height:1.6;resize:vertical;}
.wizard-actions{display:flex;gap:10px;margin-top:18px;}
.wizard-actions .btn{width:auto;flex:1;}
.progress-box{background:var(--bg-soft);border:1px solid var(--line);border-radius:10px;padding:16px;text-align:center;}
.progress-box .pb-bar{height:6px;background:var(--panel-2);border-radius:6px;overflow:hidden;margin-top:10px;}
.progress-box .pb-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2));transition:width .2s;width:0%;}
.progress-box .pb-text{font-size:12.5px;color:var(--muted);margin-top:8px;}
.unit-edit-card{background:var(--bg-soft);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px;}
.unit-edit-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;cursor:pointer;}
.unit-edit-head .uh-title{font-weight:700;font-size:13.5px;}
.unit-edit-head .uh-count{font-size:11.5px;color:var(--muted);}
.unit-edit-head .uh-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;}
.unit-edit-head .uh-del:hover{color:var(--bad);}
.unit-edit-body textarea{width:100%;min-height:140px;background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--text);padding:10px;font-family:'Courier New',monospace;font-size:12.5px;line-height:1.5;resize:vertical;}

<script type="module">
// ==========================================================================

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, onAuthStateChanged, signOut,
  createUserWithEmailAndPassword, signInWithEmailAndPassword,
  GoogleAuthProvider, signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, doc, getDoc, getDocs, setDoc, updateDoc, deleteField,
  collection, query, orderBy, where, writeBatch, serverTimestamp, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB2KIWXGGmptjJVc8klRc8NuH1OKx7w72I",
  authDomain: "englishtest-eac93.firebaseapp.com",
  projectId: "englishtest-eac93",
  storageBucket: "englishtest-eac93.firebasestorage.app",
  messagingSenderId: "83760408717",
  appId: "1:83760408717:web:fc0927999e012a54c45ac4",
  measurementId: "G-WTN0V0GX93"
};
const CONFIG_IS_PLACEHOLDER = firebaseConfig.apiKey === "REPLACE_ME";

let auth = null, db = null, firebaseReady = false;
try {
  if (!CONFIG_IS_PLACEHOLDER) {
    const fbApp = initializeApp(firebaseConfig);
    auth = getAuth(fbApp);
    db = getFirestore(fbApp);
    firebaseReady = true;
  }
} catch (e) { console.error("Firebase init xatosi:", e); }

// --------------------------------------------------------------------------
// Local demo-mode storage (used when Firebase isn't configured)
// --------------------------------------------------------------------------
const LOCAL_KEY = "vocab_kutubxona_local_v2";
function loadLocalStore() {
  try {
    const raw = localStorage.getItem(LOCAL_KEY);
    return raw ? JSON.parse(raw) : { difficult: {}, mistakes: {}, books: [], progress: {} };
  } catch (e) { return { difficult: {}, mistakes: {}, books: [], progress: {} }; }
}
function saveLocalStore() {
  try {
    localStorage.setItem(LOCAL_KEY, JSON.stringify({
      difficult: State.difficult, mistakes: State.mistakes, books: State.localBooks, progress: State.progress
    }));
  } catch (e) { /* ignore quota errors */ }
}

// --------------------------------------------------------------------------
// State
// --------------------------------------------------------------------------
const DEFAULT_COLORS = ["var(--b1)","var(--b2)","var(--b3)","var(--b4)","var(--b5)","var(--b6)","var(--b7)","var(--b8)","var(--b9)","var(--b10)"];

const State = {
  user: null,
  localMode: false,
  vocab: [],            // merged: static + firestore/public + personal + local books
  localBooks: [],        // (local mode only) uploaded books, persisted to localStorage
  difficult: {},
  mistakes: {},
  progress: {},          // key -> {book, unit, score, total, at} — last test result per chapter
  route: { name: "loading" },
  quiz: null,
  shelfQuery: "",
  upload: null           // active upload wizard session
};

function keyFor(book, unit, en) {
  return `${book}_${unit}_${en}`.toLowerCase().replace(/[^a-z0-9_]/g, "_");
}
function progKey(book, unit) {
  return `${book}_${unit}`.toLowerCase().replace(/[^a-z0-9_]/g, "_");
}
function colorFor(index) { return DEFAULT_COLORS[index % DEFAULT_COLORS.length]; }
function bookProgressPercent(book) {
  const totalUnits = book.unitCount || (book.units ? book.units.length : 0);
  if (!totalUnits) return 0;
  const doneCount = Object.values(State.progress).filter(p => String(p.book) === String(book.id)).length;
  return Math.round(100 * Math.min(doneCount, totalUnits) / totalUnits);
}

let toastTimer = null;
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2400);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function escapeAttr(s) { return escapeHtml(s); }
function shortLang(name) { return (name || "").trim().split(/\s+/)[0] || name; }
function unitLabel(u) { return u.title ? `Bob ${u.unit} — ${u.title}` : `Bob ${u.unit}`; }

// --------------------------------------------------------------------------
// Load static vocab.json (the original 6 books)
// --------------------------------------------------------------------------
async function loadVocab() {
  const res = await fetch("vocab.json");
  const raw = await res.json();
  State.vocab = raw.map((b, i) => ({
    id: b.id, title: b.title, units: b.units,
    langFrom: "Ingliz tili", langTo: "O'zbek tili",
    source: "static", color: colorFor(i)
  }));
}

// --------------------------------------------------------------------------
// Firestore / local persistence — difficult & mistakes
// --------------------------------------------------------------------------
async function loadUserData(uid) {
  if (State.localMode) {
    const local = loadLocalStore();
    State.difficult = local.difficult || {};
    State.mistakes = local.mistakes || {};
    State.localBooks = local.books || [];
    State.progress = local.progress || {};
    return;
  }
  const ref = doc(db, "users", uid);
  const snap = await getDoc(ref);
  if (snap.exists()) {
    const data = snap.data();
    State.difficult = data.difficult || {};
    State.mistakes = data.mistakes || {};
    State.progress = data.progress || {};
  } else {
    await setDoc(ref, { difficult: {}, mistakes: {}, progress: {} });
    State.difficult = {}; State.mistakes = {}; State.progress = {};
  }
}

async function toggleDifficult(book, unit, en, uz) {
  const k = keyFor(book, unit, en);
  if (State.difficult[k]) {
    delete State.difficult[k];
    if (State.localMode) { saveLocalStore(); return; }
    await updateDoc(doc(db, "users", State.user.uid), { [`difficult.${k}`]: deleteField() });
  } else {
    State.difficult[k] = { book, unit, en, uz };
    if (State.localMode) { saveLocalStore(); return; }
    await updateDoc(doc(db, "users", State.user.uid), { [`difficult.${k}`]: State.difficult[k] });
  }
}
async function removeDifficult(k) {
  delete State.difficult[k];
  if (State.localMode) { saveLocalStore(); return; }
  await updateDoc(doc(db, "users", State.user.uid), { [`difficult.${k}`]: deleteField() });
}
async function recordMistake(book, unit, en, uz) {
  const k = keyFor(book, unit, en);
  const existing = State.mistakes[k];
  const entry = existing ? { book, unit, en, uz, count: (existing.count || 1) + 1 } : { book, unit, en, uz, count: 1 };
  State.mistakes[k] = entry;
  if (State.localMode) { saveLocalStore(); return; }
  await updateDoc(doc(db, "users", State.user.uid), { [`mistakes.${k}`]: entry });
}
async function removeMistake(k) {
  delete State.mistakes[k];
  if (State.localMode) { saveLocalStore(); return; }
  await updateDoc(doc(db, "users", State.user.uid), { [`mistakes.${k}`]: deleteField() });
}
async function recordProgress(bookId, unitNum, score, total) {
  const k = progKey(bookId, unitNum);
  const entry = { book: bookId, unit: unitNum, score, total, at: Date.now() };
  State.progress[k] = entry;
  if (State.localMode) { saveLocalStore(); return; }
  try {
    await updateDoc(doc(db, "users", State.user.uid), { [`progress.${k}`]: entry });
  } catch (e) { console.error("Natijani saqlashda xato:", e); }
}

// --------------------------------------------------------------------------
// Firestore / local persistence — user-uploaded books
// --------------------------------------------------------------------------
async function fetchDynamicBooks() {
  const results = [];
  if (State.localMode) {
    State.localBooks.forEach((b, i) => {
      const source = b.visibility === "public" ? "public" : b.visibility === "group" ? "group" : "personal";
      results.push({ ...b, source, color: colorFor(i + 6) });
    });
    return results;
  }
  if (!firebaseReady) return results;
  const myEmail = (State.user && State.user.email || "").toLowerCase();
  // NOTE: each query below intentionally filters on a single field only.
  // Combining an equality filter with orderBy (or with a second filter on a
  // different field) requires a Firestore *composite index* that doesn't
  // exist by default — without it, Firestore silently rejects the whole
  // query, which looked like "public books disappear after a while" (they
  // loaded fine right after saving, since that came from local state, but
  // vanished on the next page load once it had to be queried for real).
  // Sorting is done client-side afterwards instead of via orderBy().
  try {
    const pubSnap = await getDocs(query(collection(db, "books"), where("visibility", "==", "public")));
    const pubBooks = pubSnap.docs.map(d => ({ id: d.id, ...d.data(), units: null, source: "public" }));
    pubBooks.sort((a, b) => (b.createdAt && b.createdAt.toMillis ? b.createdAt.toMillis() : 0) - (a.createdAt && a.createdAt.toMillis ? a.createdAt.toMillis() : 0));
    pubBooks.forEach((b, i) => results.push({ ...b, color: colorFor(results.length + 6) }));
  } catch (e) { console.error("Ommaviy kitoblarni yuklashda xato:", e); }
  if (myEmail) {
    try {
      const grpSnap = await getDocs(query(collection(db, "books"), where("allowedEmails", "array-contains", myEmail)));
      grpSnap.docs.forEach((d) => {
        const data = d.data();
        if (data.visibility !== "group") return; // allowedEmails is also present on the owner's own doc metadata for public books they made group-eligible; keep this filter defensive
        results.push({ id: d.id, ...data, units: null, source: "group", color: colorFor(results.length + 6) });
      });
    } catch (e) { console.error("Guruh kitoblarini yuklashda xato:", e); }
  }
  if (State.user && State.user.uid) {
    try {
      const persSnap = await getDocs(collection(db, "users", State.user.uid, "personalBooks"));
      persSnap.docs.forEach((d) => {
        const data = d.data();
        results.push({ id: d.id, ...data, units: null, source: "personal", color: colorFor(results.length + 6) });
      });
    } catch (e) { console.error("Shaxsiy kitoblarni yuklashda xato:", e); }
  }
  return results;
}

async function loadBookUnits(book) {
  if (book.units) return book.units;
  if (book.source === "static") return book.units;
  if (State.localMode) return book.units || [];
  if (!firebaseReady) return [];
  let snap;
  if (book.source === "public") {
    snap = await getDocs(query(collection(db, "books", book.id, "units"), where("visibility", "==", "public")));
  } else if (book.source === "group") {
    const myEmail = (State.user && State.user.email || "").toLowerCase();
    snap = await getDocs(query(collection(db, "books", book.id, "units"), where("allowedEmails", "array-contains", myEmail)));
  } else {
    snap = await getDocs(collection(db, "users", State.user.uid, "personalBooks", book.id, "units"));
  }
  const units = snap.docs.map(d => d.data()).sort((a, b) => a.unit - b.unit);
  book.units = units;
  return units;
}

function parseEmailList(raw, ownerEmail) {
  const emails = (raw || "")
    .split(/[\n,;]+/)
    .map(e => e.trim().toLowerCase())
    .filter(e => e && e.includes("@"));
  const set = new Set(emails);
  if (ownerEmail) set.add(ownerEmail.trim().toLowerCase());
  return [...set];
}

async function saveNewBook({ title, langFrom, langTo, visibility, groupEmails, units }) {
  const wordCount = units.reduce((s, u) => s + u.words.length, 0);
  const allowedEmails = visibility === "group" ? parseEmailList(groupEmails, State.user && State.user.email) : null;

  if (State.localMode) {
    const id = "local_" + Date.now();
    const bookObj = { id, title, langFrom, langTo, visibility, allowedEmails, units, ownerLabel: "Siz", wordCount, unitCount: units.length };
    State.localBooks.push(bookObj);
    saveLocalStore();
    return { id, source: visibility === "public" ? "public" : visibility === "group" ? "group" : "personal" };
  }

  if (!firebaseReady) throw new Error("Firebase sozlanmagan.");

  const meta = {
    title, langFrom, langTo, visibility,
    unitCount: units.length, wordCount,
    ownerUid: State.user.uid,
    ownerEmail: (State.user.email || "").toLowerCase(),
    createdAt: serverTimestamp()
  };
  if (allowedEmails) meta.allowedEmails = allowedEmails;

  // Public and group books live in the shared top-level "books" collection so
  // they can be discovered/read by other users; strictly-private books live
  // under the owner's own subcollection (already isolated by security rules).
  const collPath = visibility === "private"
    ? ["users", State.user.uid, "personalBooks"]
    : ["books"];

  const bookRef = doc(collection(db, ...collPath));
  const batch = writeBatch(db);
  batch.set(bookRef, meta);
  units.forEach(u => {
    const unitData = { unit: u.unit, words: u.words, ownerUid: State.user.uid, visibility };
    if (allowedEmails) unitData.allowedEmails = allowedEmails;
    const unitRef = doc(collection(db, ...collPath, bookRef.id, "units"), String(u.unit));
    batch.set(unitRef, unitData);
  });
  await batch.commit();
  return { id: bookRef.id, source: visibility === "public" ? "public" : visibility === "group" ? "group" : "personal" };
}

async function deleteBook(book) {
  if (State.localMode) {
    State.localBooks = State.localBooks.filter(b => b.id !== book.id);
    saveLocalStore();
    return;
  }
  if (!firebaseReady) return;
  const path = book.source === "personal" ? ["users", State.user.uid, "personalBooks", book.id] : ["books", book.id];
  // Delete unit docs first (best-effort), then the book doc. Filtered by
  // ownerUid so the query matches the Firestore rule (only the owner may
  // delete, and only-owner-matching documents may be listed at all).
  try {
    const unitsSnap = await getDocs(query(collection(db, ...path, "units"), where("ownerUid", "==", State.user.uid)));
    const batch = writeBatch(db);
    unitsSnap.docs.forEach(d => batch.delete(d.ref));
    await batch.commit();
  } catch (e) { /* ignore */ }
  await deleteDoc(doc(db, ...path));
}

// --------------------------------------------------------------------------
// Auth UI
// --------------------------------------------------------------------------
const AuthUI = {
  mode: "login",
  render() {
    const main = document.getElementById("main");
    const tpl = document.getElementById("tpl-auth").content.cloneNode(true);
    main.innerHTML = "";
    main.appendChild(tpl);
    document.getElementById("tabs").classList.add("hidden");
    document.getElementById("userChip").classList.add("hidden");
    document.getElementById("searchWrap").classList.add("hidden");

    if (CONFIG_IS_PLACEHOLDER) {
      document.getElementById("setupNote").innerHTML =
        "⚠️ Firebase sozlanmagan. <code>index.html</code> ichidagi <code>firebaseConfig</code> qiymatini " +
        "o'zingizning Firebase loyihangiz ma'lumotlariga almashtiring (README.md). Hozircha kirish ishlamaydi.";
    }
    this.applyMode();
    document.getElementById("authSubmit").onclick = () => this.submit();
    document.getElementById("authGoogle").onclick = () => this.google();
    document.getElementById("authPassword").addEventListener("keydown", (e) => { if (e.key === "Enter") this.submit(); });
  },
  applyMode() {
    const title = document.getElementById("authTitle");
    const submitBtn = document.getElementById("authSubmit");
    const switchText = document.getElementById("authSwitch");
    if (this.mode === "login") {
      title.textContent = "Xush kelibsiz";
      submitBtn.textContent = "Kirish";
      switchText.innerHTML = 'Hisobingiz yo\'qmi? <span id="authSwitchLink">Ro\'yhatdan o\'ting</span>';
    } else {
      title.textContent = "Ro'yhatdan o'tish";
      submitBtn.textContent = "Ro'yhatdan o'tish";
      switchText.innerHTML = 'Hisobingiz bormi? <span id="authSwitchLink">Kiring</span>';
    }
    document.getElementById("authSwitchLink").onclick = () => { this.mode = this.mode === "login" ? "register" : "login"; this.applyMode(); };
  },
  showError(msg) { const el = document.getElementById("authError"); el.textContent = msg; el.classList.remove("hidden"); },
  async submit() {
    if (!firebaseReady) { this.showError("Firebase sozlanmagan (yuqoridagi izohga qarang)."); return; }
    const email = document.getElementById("authEmail").value.trim();
    const pass = document.getElementById("authPassword").value;
    if (!email || !pass) { this.showError("Email va parolni kiriting."); return; }
    document.getElementById("authError").classList.add("hidden");
    try {
      if (this.mode === "login") await signInWithEmailAndPassword(auth, email, pass);
      else await createUserWithEmailAndPassword(auth, email, pass);
    } catch (e) { this.showError(this.friendlyError(e)); }
  },
  async google() {
    if (!firebaseReady) { this.showError("Firebase sozlanmagan (yuqoridagi izohga qarang)."); return; }
    try { await signInWithPopup(auth, new GoogleAuthProvider()); } catch (e) { this.showError(this.friendlyError(e)); }
  },
  friendlyError(e) {
    const code = e && e.code ? e.code : "";

// --------------------------------------------------------------------------
// Quiz engine
// --------------------------------------------------------------------------
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}
function pickDistractors(pool, count, exclude) {
  const excludeSet = new Set(exclude.map(x => x.trim().toLowerCase()));
  const seen = new Set();
  const candidates = shuffle(pool).filter(v => {
    const key = v.trim().toLowerCase();
    if (excludeSet.has(key) || seen.has(key)) return false;
    seen.add(key); return true;
  });
  return candidates.slice(0, count);
}
const Quiz = {
  start(book, unit, direction) {
    const unitWords = unit.words;
    const otherUnitWords = (book.units || []).filter(u => u.unit !== unit.unit).flatMap(u => u.words);
    const questions = shuffle(unitWords).map(word => {
      const answer = direction === "a2b" ? word.uz : word.en;
      const prompt = direction === "a2b" ? word.en : word.uz;
      const sameUnitPool = unitWords.filter(w => w.en !== word.en).map(w => direction === "a2b" ? w.uz : w.en);
      const bookPool = otherUnitWords.map(w => direction === "a2b" ? w.uz : w.en);
      const d1 = pickDistractors(sameUnitPool, 2, [answer]);
      const d2 = pickDistractors(bookPool, 2, [answer, ...d1]);
      let options = [answer, ...d1, ...d2];
      if (options.length < 4) {
        const backfill = pickDistractors([...sameUnitPool, ...bookPool], 4 - options.length, [...options]);
        options = [...options, ...backfill];
      }
      options = shuffle(options.slice(0, 4));
      return { word, prompt, answer, options, wrong: false };
    });
    State.quiz = { book, unit, direction, questions, index: 0, score: 0 };
    Nav.go("quiz");
  }
};
window.Quiz = Quiz;

// ==========================================================================
// Generalized book-text parser (shared by the upload wizard)
// ==========================================================================
function cleanJunk(s) {
  return s.replace(/\bPage\s+\d+\s+of\s+\d+\b/gi, "").replace(/\s{2,}/g, " ").trim();
}
function detectSeparator(text) {
  const emCount = (text.match(/\s[\u2013\u2014]\s/g) || []).length;
  const hyphenCount = (text.match(/\s-\s/g) || []).length;
  if (emCount >= hyphenCount && emCount > 0) return "[\u2013\u2014]";
  if (hyphenCount > 0) return "-";
  return "[-\u2013\u2014]";
}
function findNumberedChain(text) {
  const re = /(?:^|\s)(\d{1,3})(?=\s)/g;
  const candidates = [];
  let m;
  while ((m = re.exec(text)) !== null) {
    candidates.push({ num: Number(m[1]), numStart: m.index, textStart: m.index + m[0].length });
  }
  if (candidates.length === 0) return [];
  let startIdx = candidates.findIndex(c => c.num === 1);
  if (startIdx === -1) startIdx = 0;
  const accepted = [candidates[startIdx]];
  let expected = candidates[startIdx].num + 1;
  for (let j = startIdx + 1; j < candidates.length; j++) {
    if (candidates[j].num === expected) { accepted.push(candidates[j]); expected += 1; }
  }
  return accepted;
}
function splitEnUz(raw, sep) {
  const sm = raw.match(new RegExp("^(.+?)\\s*" + sep + "\\s*([\\s\\S]+)$")) || raw.match(/^(.+?)\s*:\s*([\s\S]+)$/);
  if (!sm) return null;
  const en = sm[1].replace(/\s+/g, " ").trim();
  const uz = cleanJunk(sm[2].replace(/\s+/g, " "));
  if (!en || !uz) return null;
  return { en, uz };
}
function extractEntries(blockText, sep) {
  const chain = findNumberedChain(blockText);
  if (chain.length >= 2) {
    const entries = [];
    for (let i = 0; i < chain.length; i++) {
      const start = chain[i].textStart;
      const end = i + 1 < chain.length ? chain[i + 1].numStart : blockText.length;
      const pair = splitEnUz(blockText.slice(start, end).trim(), sep);
      if (pair) entries.push(pair);
    }
    if (entries.length >= 2) return entries;
  }
  const lines = blockText.split("\n").map(l => l.replace(/^[\u2022*\-]\s*/, "").trim()).filter(Boolean);
  const perLine = [];
  for (const line of lines) {
    const pair = splitEnUz(line.replace(/^\d{1,3}\s+/, ""), sep);
    if (pair) perLine.push(pair);
  }
  return perLine;
}
function parseRawText(text, wordsPerUnit) {
  const sep = detectSeparator(text);
  const sepTestRe = new RegExp(sep);
  const rawLines = text.split("\n").map(l => l.trim()).filter(Boolean);

  const unitHeaderRe = /^(?:unit|bob|bo['\u2019]lim)\s*[:\-\u2013\u2014]?\s*(\d+)$/i;
  const altHeaderRe = /^(\d+)\s*[-\u2013\u2014]?\s*(?:bob|bo['\u2019]lim)$/i;
  const topicHeaderRe = /^(\d{1,3})\s+([A-Za-z][A-Za-z'\u2019\s]{1,40})$/;

  const chunks = [];
  let current = null;
  let sawHeader = false;

  for (const raw of rawLines) {
    const line = raw.replace(/^[\u2022*\-]\s*/, "").trim();
    let m = line.match(unitHeaderRe) || line.match(altHeaderRe);
    if (m) { current = { unit: Number(m[1]), title: null, lines: [] }; chunks.push(current); sawHeader = true; continue; }
    m = line.match(topicHeaderRe);
    if (m && !sepTestRe.test(line) && !line.includes(":")) {
      current = { unit: chunks.length + 1, title: m[2].trim(), lines: [] };
      chunks.push(current); sawHeader = true; continue;
    }
    if (!current) { current = { unit: 1, title: null, lines: [] }; chunks.push(current); }
    current.lines.push(line);
  }

  let units = chunks
    .map(c => ({ unit: c.unit, title: c.title, words: extractEntries(c.lines.join("\n"), sep) }))
    .filter(u => u.words.length > 0);

  if (!sawHeader) {
    const all = units.flatMap(u => u.words);
    const rechunked = [];
    for (let i = 0; i < all.length; i += wordsPerUnit) rechunked.push({ unit: rechunked.length + 1, title: null, words: all.slice(i, i + wordsPerUnit) });
    return rechunked;
  }
  return units.map((u, i) => ({ unit: i + 1, title: u.title, words: u.words }));
}

function unitToText(unit) { return unit.words.map(w => `${w.en} - ${w.uz}`).join("\n"); }
function textToWords(text) {
  const bulletRe = /^[•*\-]\s*/;
  return text.split("\n").map(l => l.trim().replace(bulletRe, "")).filter(Boolean).map(line => {
    const sep = line.match(/^(.+?)\s*[-\u2013\u2014:]\s*(.+)$/);
    if (!sep) return null;
    return { en: sep[1].trim(), uz: sep[2].trim() };
  }).filter(Boolean);
}

// ==========================================================================
// File text extraction (PDF / DOCX), lazy-loaded libraries + OCR fallback
// ==========================================================================
const Extract = {
  loaded: { pdfjs: false, mammoth: false, tesseract: false },

  loadScript(src) {
    return new Promise((resolve, reject) => {
      const s = document.createElement("script");
      s.src = src; s.onload = resolve; s.onerror = () => reject(new Error("Kutubxona yuklanmadi: " + src));
      document.head.appendChild(s);
    });
  },
  async ensurePdfJs() {
    if (this.loaded.pdfjs) return;
    await this.loadScript("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js");
    window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    this.loaded.pdfjs = true;
  },
  async ensureMammoth() {
    if (this.loaded.mammoth) return;
    await this.loadScript("https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js");
    this.loaded.mammoth = true;
  },
  async ensureTesseract() {
    if (this.loaded.tesseract) return;
    await this.loadScript("https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.0.4/tesseract.min.js");
    this.loaded.tesseract = true;
  },

  async fromDocx(file, onProgress) {
    onProgress("Word fayl o'qilmoqda...", 20);
    await this.ensureMammoth();
    const arrayBuffer = await file.arrayBuffer();
    const result = await window.mammoth.extractRawText({ arrayBuffer });
    onProgress("Tayyor", 100);
    return result.value;
  },

  reconstructPageText(items, pageWidth) {
    if (items.length === 0) return "";
    const xs = items.map(it => it.transform[4]);
    const minX = Math.min(...xs), maxX = Math.max(...xs);
    const mid = (minX + maxX) / 2;
    const left = items.filter(it => it.transform[4] < mid);
    const right = items.filter(it => it.transform[4] >= mid);
    const isTwoColumn = pageWidth && left.length >= items.length * 0.25 && right.length >= items.length * 0.25;

    const linesFromItems = (arr) => {
      const groups = [];
      arr.forEach(it => {
        const y = it.transform[5];
        let g = groups.find(g => Math.abs(g.y - y) <= 3);
        if (!g) { g = { y, items: [] }; groups.push(g); }
        g.items.push({ x: it.transform[4], str: it.str });
      });
      groups.sort((a, b) => b.y - a.y);
      return groups.map(g => g.items.sort((a, b) => a.x - b.x).map(it => it.str).join(" ")).join("\n");
    };

    if (isTwoColumn) return linesFromItems(left) + "\n" + linesFromItems(right);
    return linesFromItems(items);
  },

  async fromPdf(file, ocrLang, onProgress) {
    onProgress("PDF ochilmoqda...", 5);
    await this.ensurePdfJs();
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let text = "";
    const n = pdf.numPages;
    for (let i = 1; i <= n; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      const viewport = page.getViewport({ scale: 1 });
      text += this.reconstructPageText(content.items, viewport.width) + "\n";
      onProgress(`Matn chiqarilmoqda: sahifa ${i}/${n}`, 5 + Math.round((i / n) * 35));
    }

    const meaningfulChars = text.replace(/\s/g, "").length;
    const perPage = meaningfulChars / n;
    if (perPage > 25) { onProgress("Tayyor", 100); return text; }

    onProgress("Rasmli sahifa aniqlandi, OCR ishga tushirilmoqda...", 42);
    await this.ensureTesseract();
    const worker = await window.Tesseract.createWorker(ocrLang || "eng", 1, {
      logger: (m) => {
        if (m.status === "recognizing text") {
          const pct = 45 + Math.round(m.progress * 50);
          onProgress(`OCR bilan o'qilmoqda... (${Math.round(m.progress * 100)}%)`, pct);
        }
      }
    });
    let ocrText = "";
    for (let i = 1; i <= n; i++) {
      const page = await pdf.getPage(i);
      const viewport = page.getViewport({ scale: 2.2 });
      const canvas = document.createElement("canvas");
      canvas.width = viewport.width; canvas.height = viewport.height;
      const ctx = canvas.getContext("2d");
      await page.render({ canvasContext: ctx, viewport }).promise;
      const { data } = await worker.recognize(canvas);
      ocrText += data.text + "\n";
      onProgress(`OCR: sahifa ${i}/${n}`, 45 + Math.round((i / n) * 50));
    }
    await worker.terminate();
    onProgress("Tayyor", 100);
    return ocrText;
  },

  async run(file, ocrLang, onProgress) {
    const name = file.name.toLowerCase();
    if (name.endsWith(".docx")) return this.fromDocx(file, onProgress);
    if (name.endsWith(".pdf")) return this.fromPdf(file, ocrLang, onProgress);
    throw new Error("Faqat .pdf yoki .docx fayllar qo'llab-quvvatlanadi.");
  }
};

// ==========================================================================
// Upload wizard
// ==========================================================================
const Upload = {
  fresh() {
    return {
      step: 1, file: null,
      title: "", langFrom: "", langTo: "", visibility: "public", groupEmails: "",
      wordsPerUnit: 20, ocrLang: "eng",
      rawText: "", units: [],
      busy: false, busyText: "", busyPct: 0
    };
  },

  render(main) {
    if (!State.upload) State.upload = this.fresh();
    const s = State.upload;
    const stepsHtml = [1, 2, 3].map(n => `<div class="ws ${s.step >= n ? "done" : ""}"></div>`).join("");
    main.innerHTML = `
      ${Views.crumbs([{ label: "Kutubxona" }, { label: "Yangi kitob qo'shish" }])}
      <div class="section-head"><h1>Yangi kitob qo'shish</h1></div>
      <div class="wizard-steps">${stepsHtml}</div>
      <div id="wizardBody"></div>
    `;
    main.querySelector('[data-crumb="0"]').onclick = () => { State.upload = null; Nav.go("shelf"); };
    if (s.step === 1) this.renderStep1();
    else if (s.step === 2) this.renderStep2();
    else if (s.step === 3) this.renderStep3();
  },

  setBusy(text, pct) {
    const s = State.upload; s.busyText = text; s.busyPct = pct;
    const box = document.getElementById("busyBox");
    if (box) {
      box.querySelector(".pb-text").textContent = text;
      box.querySelector(".pb-fill").style.width = pct + "%";
    }
  },

  renderStep1() {
    const s = State.upload;
    const body = document.getElementById("wizardBody");
    const demoNote = !firebaseReady
      ? `<div class="summary-box">🔧 Demo rejimda ushbu kitob faqat shu brauzerda saqlanadi (Firebase sozlanmagan).</div>`
      : "";
    body.innerHTML = `
      <div class="wizard-card">
        <h3>1-qadam: Fayl va ma'lumotlar</h3>
        <div class="wc-hint">Rasmli (skanerlangan) PDF, matnli PDF yoki DOCX faylni yuklashingiz mumkin.</div>
        ${demoNote}
        <div class="field"><label>Kitob nomi</label><input type="text" id="upTitle" placeholder="Masalan: 1000 Rus tili so'zlari" value="${escapeAttr(s.title)}"></div>
        <div class="field-row">
          <div class="field"><label>Tildan</label><input type="text" id="upLangFrom" placeholder="Masalan: Ingliz tili" value="${escapeAttr(s.langFrom)}"></div>
          <div class="field"><label>Tilga</label><input type="text" id="upLangTo" placeholder="Masalan: Rus tili" value="${escapeAttr(s.langTo)}"></div>
        </div>
        <div class="field">
          <label>Kimlarga ko'rinsin?</label>
          <div class="radio-row">
            <div class="radio-opt ${s.visibility === "public" ? "active" : ""}" data-vis="public">
              <div class="ro-title">Hammaga<span class="recommend-tag">tavsiya etiladi</span></div>
              <div class="ro-sub">Saytdagi barcha foydalanuvchilar ko'radi va foydalanadi</div>
            </div>
            <div class="radio-opt ${s.visibility === "group" ? "active" : ""}" data-vis="group">
              <div class="ro-title">Guruhga</div>
              <div class="ro-sub">Faqat siz kiritgan email egalari ko'radi (masalan o'quvchilaringiz)</div>
            </div>
            <div class="radio-opt ${s.visibility === "private" ? "active" : ""}" data-vis="private">
              <div class="ro-title">Faqat menga</div>
              <div class="ro-sub">Shaxsiy ro'yxatingizda, boshqalarga ko'rinmaydi</div>
            </div>
          </div>
        </div>
        ${s.visibility === "group" ? `
        <div class="field">
          <label>Guruh a'zolarining email manzillari (har birini yangi qatorga yoki vergul bilan yozing)</label>
          <textarea id="upGroupEmails" rows="4" style="width:100%;padding:11px 13px;border-radius:10px;border:1px solid var(--line);background:var(--bg-soft);color:var(--text);font-size:13.5px;font-family:'Courier New',monospace;resize:vertical;" placeholder="ali@misol.com&#10;vali@misol.com">${escapeHtml(s.groupEmails)}</textarea>
          <div class="subhint">Ko'rsatilgan emaillar bilan ro'yhatdan o'tgan foydalanuvchilargina bu kitobni ko'ra oladi. Siz o'zingiz ham avtomatik qo'shilasiz.</div>
        </div>` : ""}
        <div class="field"><label>Bobda nechta so'z (kitobda bob belgisi topilmasa shu son bo'yicha bo'linadi)</label><input type="number" id="upWordsPerUnit" value="${s.wordsPerUnit}" min="5" max="60"></div>
        <div class="field"><label>Fayl (.pdf yoki .docx)</label><input type="file" id="upFile" accept=".pdf,.docx"></div>
        <div class="field" id="ocrLangField">
          <label>Agar fayl rasmli (skanerlangan) bo'lsa, OCR tili</label>
          <select id="upOcrLang">
            <option value="eng" ${s.ocrLang === "eng" ? "selected" : ""}>Inglizcha</option>
            <option value="uzb" ${s.ocrLang === "uzb" ? "selected" : ""}>O'zbekcha (lotin)</option>
            <option value="rus" ${s.ocrLang === "rus" ? "selected" : ""}>Ruscha</option>
            <option value="tur" ${s.ocrLang === "tur" ? "selected" : ""}>Turkcha</option>
            <option value="eng+uzb" ${s.ocrLang === "eng+uzb" ? "selected" : ""}>Inglizcha + O'zbekcha</option>
          </select>
        </div>
        <div id="busyBox" class="progress-box hidden">
          <div class="pb-text">...</div>
          <div class="pb-bar"><div class="pb-fill" style="width:0%"></div></div>
        </div>
        <div class="wizard-actions">
          <button class="btn btn-primary" id="extractBtn">Matnni chiqarish →</button>
        </div>
      </div>
    `;
    document.getElementById("upTitle").oninput = (e) => s.title = e.target.value;
    document.getElementById("upLangFrom").oninput = (e) => s.langFrom = e.target.value;
    document.getElementById("upLangTo").oninput = (e) => s.langTo = e.target.value;
    document.getElementById("upWordsPerUnit").oninput = (e) => s.wordsPerUnit = Number(e.target.value) || 20;
    document.getElementById("upOcrLang").onchange = (e) => s.ocrLang = e.target.value;
    document.getElementById("upFile").onchange = (e) => s.file = e.target.files[0] || null;
    const groupEmailsEl = document.getElementById("upGroupEmails");
    if (groupEmailsEl) groupEmailsEl.oninput = (e) => s.groupEmails = e.target.value;
    document.querySelectorAll(".radio-opt").forEach(el => {
      el.onclick = () => { s.visibility = el.dataset.vis; this.renderStep1(); };
    });
    document.getElementById("extractBtn").onclick = () => this.doExtract();
  },

  async doExtract() {
    const s = State.upload;
    if (!s.title.trim()) return toast("Kitob nomini kiriting");
    if (!s.langFrom.trim() || !s.langTo.trim()) return toast("Tillarni kiriting");
    if (!s.file) return toast("Faylni tanlang");
    if (s.visibility === "group" && !s.groupEmails.trim()) return toast("Guruh a'zolarining emaillarini kiriting");

    const busyBox = document.getElementById("busyBox");
    busyBox.classList.remove("hidden");
    document.getElementById("extractBtn").disabled = true;

    try {
      const text = await Extract.run(s.file, s.ocrLang, (msg, pct) => this.setBusy(msg, pct));
      s.rawText = text;
      s.step = 2;
      Upload.render(document.getElementById("main"));
    } catch (e) {
      console.error(e);
      toast("Xatolik: " + (e.message || "matnni chiqarib bo'lmadi"));
      document.getElementById("extractBtn").disabled = false;
    }
  },

  renderStep2() {
    const s = State.upload;
    const body = document.getElementById("wizardBody");
    body.innerHTML = `
      <div class="wizard-card">
        <h3>2-qadam: Matnni tozalash</h3>
        <div class="wc-hint">Chiqarilgan matnni ko'rib chiqing — sahifa raqamlari, keraksiz qatorlarni o'chiring, OCR xatolarini tuzating. Har bir so'z qatori <code>so'z - tarjima</code> ko'rinishida bo'lishi kerak.</div>
        <textarea class="raw-textarea" id="rawTextArea">${escapeHtml(s.rawText)}</textarea>
        <div class="wizard-actions">
          <button class="btn btn-ghost" id="backTo1">← Ortga</button>
          <button class="btn btn-primary" id="toStep3">Boblarga ajratish →</button>
        </div>
      </div>
    `;
    document.getElementById("rawTextArea").oninput = (e) => s.rawText = e.target.value;
    document.getElementById("backTo1").onclick = () => { s.step = 1; Upload.render(document.getElementById("main")); };
    document.getElementById("toStep3").onclick = () => {
      const parsed = parseRawText(s.rawText, s.wordsPerUnit);
      if (parsed.length === 0 || parsed.every(u => u.words.length === 0)) {
        toast("Hech qanday so'z topilmadi. Matn formatini tekshiring.");
        return;
      }
      s.units = parsed;
      s.step = 3;
      Upload.render(document.getElementById("main"));
    };
  },

  renderStep3() {
    const s = State.upload;
    const body = document.getElementById("wizardBody");
    const totalWords = s.units.reduce((sum, u) => sum + u.words.length, 0);
    const cards = s.units.map((u, i) => `
      <div class="unit-edit-card" data-idx="${i}">
        <div class="unit-edit-head" data-toggle="${i}">
          <span class="uh-title">${escapeHtml(unitLabel(u))}</span>
          <span class="uh-count">${u.words.length} so'z</span>
          <button class="uh-del" data-deleteunit="${i}" title="Bobni o'chirish">✕</button>
        </div>
        <div class="unit-edit-body hidden" id="ub-${i}">
          <textarea data-unittext="${i}">${escapeHtml(unitToText(u))}</textarea>
        </div>
      </div>
    `).join("");
    body.innerHTML = `
      <div class="wizard-card" style="max-width:720px;">
        <h3>3-qadam: Boblarni ko'rib chiqish</h3>
        <div class="summary-box">${s.units.length} ta bob aniqlandi, jami <b>${totalWords}</b> ta so'z. Har bir bobni ochib, tekshiring va kerak bo'lsa tuzating.</div>
        ${cards}
        <div class="wizard-actions">
          <button class="btn btn-ghost" id="backTo2">← Ortga</button>
          <button class="btn btn-primary" id="saveBookBtn">✅ Kitobni saqlash</button>
        </div>
      </div>
    `;
    body.querySelectorAll("[data-toggle]").forEach(head => {
      head.onclick = (e) => {
        if (e.target.closest("[data-deleteunit]")) return;
        const i = head.dataset.toggle;
        document.getElementById("ub-" + i).classList.toggle("hidden");
      };
    });
    body.querySelectorAll("[data-deleteunit]").forEach(btn => {
      btn.onclick = (e) => {
        e.stopPropagation();
        const i = Number(btn.dataset.deleteunit);
        s.units.splice(i, 1);
        s.units.forEach((u, ni) => u.unit = ni + 1);
        this.renderStep3();
      };
    });
    body.querySelectorAll("[data-unittext]").forEach(ta => {
      ta.oninput = () => { s.units[Number(ta.dataset.unittext)]._editedText = ta.value; };
    });
    document.getElementById("backTo2").onclick = () => { s.step = 2; Upload.render(document.getElementById("main")); };
    document.getElementById("saveBookBtn").onclick = () => this.save();
  },

  async save() {
    const s = State.upload;
    const finalUnits = s.units.map((u, i) => {
      const ta = document.querySelector(`[data-unittext="${i}"]`);
      const text = ta ? ta.value : unitToText(u);
      return { unit: i + 1, title: u.title || null, words: textToWords(text) };
    }).filter(u => u.words.length > 0);

    if (finalUnits.length === 0) return toast("Saqlash uchun so'z topilmadi.");

    const btn = document.getElementById("saveBookBtn");
    btn.disabled = true; btn.textContent = "Saqlanmoqda...";
    try {
      const { id, source } = await saveNewBook({
        title: s.title.trim(), langFrom: s.langFrom.trim(), langTo: s.langTo.trim(),
        visibility: s.visibility, groupEmails: s.groupEmails, units: finalUnits
      });
      const wordCount = finalUnits.reduce((sum, u) => sum + u.words.length, 0);
      const allowedEmails = s.visibility === "group" ? parseEmailList(s.groupEmails, State.user && State.user.email) : null;
      State.vocab.push({
        id, title: s.title.trim(), langFrom: s.langFrom.trim(), langTo: s.langTo.trim(),
        units: finalUnits, unitCount: finalUnits.length, wordCount,
        source, visibility: s.visibility, allowedEmails,
        ownerUid: State.user ? State.user.uid : null,
        color: colorFor(State.vocab.length)
      });
      toast("Kitob muvaffaqiyatli saqlandi!");
      State.upload = null;
      Nav.go("shelf");
    } catch (e) {
      console.error(e);
      toast("Saqlashda xato: " + (e.message || ""));
      btn.disabled = false; btn.textContent = "✅ Kitobni saqlash";
    }
  }
};

async function afterLogin() {
  document.getElementById("tabs").classList.remove("hidden");
  document.getElementById("userChip").classList.remove("hidden");
  const dynamicBooks = await fetchDynamicBooks();
  dynamicBooks.forEach(b => State.vocab.push(b));
  Nav.go("shelf");
}

async function boot() {
  await loadVocab();

  if (!firebaseReady) {
    State.localMode = true;
    State.user = { uid: "local", email: "Mehmon (lokal rejim)" };
    await loadUserData("local");
    document.getElementById("userEmail").textContent = "Mehmon (lokal)";
    document.getElementById("userChip").querySelector("button").textContent = "Tozalash";
    document.getElementById("userChip").querySelector("button").onclick = () => {
      if (confirm("Shu brauzerdagi barcha saqlangan ma'lumotlarni o'chirasizmi?")) {
        localStorage.removeItem(LOCAL_KEY);
        State.difficult = {}; State.mistakes = {};
        State.vocab = State.vocab.filter(b => b.source === "static");
        State.localBooks = [];
        Nav.go("shelf");
        toast("Tozalandi");
      }
    };
    showDemoBanner();
    await afterLogin();
    return;
  }

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      State.user = user;
      await loadUserData(user.uid);
      document.getElementById("userEmail").textContent = user.email || "Foydalanuvchi";
      await afterLogin();
    } else {
      State.user = null;
      document.getElementById("tabs").classList.add("hidden");
      document.getElementById("userChip").classList.add("hidden");
      State.vocab = State.vocab.filter(b => b.source === "static");
      AuthUI.render();
    }
  });
}

boot();
