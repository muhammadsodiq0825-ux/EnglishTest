<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>So'zlar Kutubxonasi — 4000 Essential English Words</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#11131c;
  --bg-soft:#171a26;
  --panel:#1d2133;
  --panel-2:#242841;
  --line:rgba(255,255,255,0.08);
  --text:#eef0f7;
  --muted:#9aa1ba;
  --accent:#e8a33d;
  --accent-2:#f4c569;
  --good:#4caf7d;
  --bad:#e0605a;
  --b1:#3f8f52; /* book1 green */
  --b2:#c1443a; /* book2 red */
  --b3:#3170ad; /* book3 blue */
  --b4:#8f3f8c; /* book4 purple */
  --b5:#1f8079; /* book5 teal */
  --b6:#5b6478; /* book6 slate */
  --radius:14px;
  --shadow: 0 10px 30px rgba(0,0,0,0.35);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background: radial-gradient(1200px 600px at 80% -10%, #1a2138 0%, transparent 60%), var(--bg);
  color:var(--text);
  font-family:'Manrope',sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.display{
  font-family:'Fraunces',serif;
  letter-spacing:-0.01em;
}
button{font-family:inherit;}
a{color:inherit;}
::selection{background:var(--accent);color:#1a1a1a;}

.hidden{display:none !important;}

/* ---------- App shell ---------- */
#app{max-width:980px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

header.topbar{
  position:sticky;top:0;z-index:20;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;
  background:rgba(17,19,28,0.85);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}
.brand{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;}
.brand-mark{
  width:34px;height:34px;border-radius:9px;
  background:linear-gradient(160deg,var(--accent),#c97a1f);
  display:flex;align-items:center;justify-content:center;
  font-family:'Fraunces',serif;font-weight:700;color:#1a1206;font-size:16px;
  box-shadow:0 4px 12px rgba(232,163,61,0.3);
}
.brand-title{font-family:'Fraunces',serif;font-weight:600;font-size:17px;line-height:1.1;}
.brand-sub{font-size:11px;color:var(--muted);}

nav.tabs{display:flex;gap:4px;}
nav.tabs button{
  background:none;border:none;color:var(--muted);
  padding:8px 12px;border-radius:8px;font-size:13px;font-weight:600;
  cursor:pointer;transition:.15s;
}
nav.tabs button:hover{color:var(--text);background:var(--panel);}
nav.tabs button.active{color:var(--accent);background:var(--panel-2);}

.user-chip{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);}
.user-chip button{
  background:var(--panel);border:1px solid var(--line);color:var(--text);
  padding:6px 10px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;
}
.user-chip button:hover{border-color:var(--accent);color:var(--accent);}

main{flex:1;padding:22px 18px 60px;}

/* ---------- Auth ---------- */
.auth-wrap{
  max-width:400px;margin:6vh auto 0;
  background:var(--panel);border:1px solid var(--line);
  border-radius:var(--radius);padding:32px 28px;box-shadow:var(--shadow);
}
.auth-hero{text-align:center;margin-bottom:22px;}
.auth-hero .brand-mark{margin:0 auto 14px;width:52px;height:52px;font-size:24px;border-radius:14px;}
.auth-hero h1{font-size:22px;margin:0 0 6px;}
.auth-hero p{color:var(--muted);font-size:13.5px;margin:0;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600;}
.field input{
  width:100%;padding:11px 13px;border-radius:10px;border:1px solid var(--line);
  background:var(--bg-soft);color:var(--text);font-size:14px;outline:none;transition:.15s;
}
.field input:focus{border-color:var(--accent);}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:11px 18px;border-radius:10px;border:none;cursor:pointer;
  font-weight:700;font-size:14px;transition:.15s;
}
.btn-primary{background:linear-gradient(160deg,var(--accent-2),var(--accent));color:#1a1206;width:100%;}
.btn-primary:hover{filter:brightness(1.06);}
.btn-ghost{background:var(--panel-2);color:var(--text);border:1px solid var(--line);width:100%;}
.btn-ghost:hover{border-color:var(--accent);}
.auth-switch{text-align:center;margin-top:16px;font-size:13px;color:var(--muted);}
.auth-switch span{color:var(--accent);cursor:pointer;font-weight:700;}
.auth-error{
  background:rgba(224,96,90,0.12);border:1px solid rgba(224,96,90,0.4);
  color:#ff9b96;padding:9px 12px;border-radius:8px;font-size:12.5px;margin-bottom:14px;
}
.auth-divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--muted);font-size:12px;}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--line);}
.setup-note{
  margin-top:18px;font-size:11.5px;color:var(--muted);line-height:1.5;
  border-top:1px dashed var(--line);padding-top:12px;
}
.setup-note code{background:var(--bg-soft);padding:1px 5px;border-radius:4px;}

/* ---------- Section headers ---------- */
.section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:8px;}
.section-head h1{font-size:24px;margin:0;}
.section-head .hint{color:var(--muted);font-size:13px;}
.crumbs{color:var(--muted);font-size:12.5px;margin-bottom:6px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.crumbs span.link{cursor:pointer;color:var(--accent);font-weight:600;}

/* ---------- Bookshelf ---------- */
.shelf-intro{color:var(--muted);font-size:13.5px;margin:-6px 0 22px;max-width:60ch;}
.shelf{
  display:flex;gap:14px;padding:26px 20px 34px;
  background:linear-gradient(180deg, transparent 0%, transparent 82%, #2a2113 82%, #171009 100%);
  border-radius:var(--radius);
  overflow-x:auto;
  align-items:flex-end;
}
.spine{
  --bc:#666;
  flex:0 0 auto;
  width:88px;height:230px;
  border-radius:8px 8px 4px 4px;
  background:linear-gradient(100deg, var(--bc) 0%, color-mix(in srgb, var(--bc) 70%, black) 100%);
  box-shadow: inset 3px 0 0 rgba(255,255,255,0.18), inset -3px 0 0 rgba(0,0,0,0.25), 0 12px 18px rgba(0,0,0,0.4);
  position:relative;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:space-between;
  padding:14px 6px;color:#fff;
  transition:transform .18s ease, box-shadow .18s ease;
  transform-origin:bottom center;
}
.spine:hover{transform:translateY(-10px) rotate(-1deg);box-shadow:0 20px 26px rgba(0,0,0,0.5);}
.spine .num{
  font-family:'Fraunces',serif;font-size:30px;font-weight:700;
  text-shadow:0 2px 4px rgba(0,0,0,0.35);
}
.spine .label{writing-mode:vertical-rl;font-size:11px;letter-spacing:.04em;font-weight:700;opacity:.92;text-align:center;}
.spine .prog{font-size:10px;background:rgba(0,0,0,0.28);padding:3px 6px;border-radius:20px;font-weight:700;}

.book-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;}
.book-card{
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:16px;cursor:pointer;transition:.15s;position:relative;overflow:hidden;
}
.book-card:hover{border-color:var(--accent);transform:translateY(-2px);}
.book-card .tag{
  display:inline-block;font-size:11px;font-weight:800;padding:3px 8px;border-radius:20px;
  color:#fff;margin-bottom:10px;
}
.book-card h3{margin:0 0 4px;font-size:16px;}
.book-card p{margin:0;color:var(--muted);font-size:12px;}

/* ---------- Units grid ---------- */
.units-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(74px,1fr));gap:10px;}
.unit-tile{
  background:var(--panel);border:1px solid var(--line);border-radius:10px;
  padding:14px 6px;text-align:center;cursor:pointer;transition:.15s;font-weight:700;
}
.unit-tile:hover{border-color:var(--accent);color:var(--accent);}
.unit-tile .u-label{font-size:10px;color:var(--muted);display:block;font-weight:600;margin-bottom:2px;}

/* ---------- Unit / word list ---------- */
.unit-toolbar{
  display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between;
  background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:18px;
}
.seg{display:flex;background:var(--bg-soft);border-radius:9px;padding:3px;gap:2px;}
.seg button{
  background:none;border:none;color:var(--muted);padding:7px 11px;border-radius:7px;
  font-size:12.5px;font-weight:700;cursor:pointer;
}
.seg button.active{background:var(--panel-2);color:var(--accent);}
.btn-test{
  background:linear-gradient(160deg,var(--accent-2),var(--accent));color:#1a1206;border:none;
  padding:10px 18px;border-radius:9px;font-weight:800;cursor:pointer;font-size:13.5px;
}
.btn-test:hover{filter:brightness(1.05);}

.word-list{display:flex;flex-direction:column;gap:8px;}
.word-row{
  background:var(--panel);border:1px solid var(--line);border-radius:11px;
  padding:13px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:.12s;
}
.word-row:hover{border-color:rgba(232,163,61,0.4);}
.word-en{font-family:'Fraunces',serif;font-weight:600;font-size:16.5px;min-width:120px;}
.word-uz{
  color:var(--muted);font-size:14px;flex:1;
  filter:blur(5px);opacity:.6;transition:filter .2s, opacity .2s;user-select:none;
}
.word-row.revealed .word-uz{filter:blur(0);opacity:1;user-select:text;}
.star-btn{
  background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted);
  padding:4px;line-height:1;flex-shrink:0;
}
.star-btn.active{color:var(--accent);}
.star-btn:hover{color:var(--accent-2);}

/* ---------- Quiz ---------- */
.quiz-wrap{max-width:560px;margin:0 auto;}
.quiz-progress{
  height:6px;background:var(--panel);border-radius:6px;overflow:hidden;margin-bottom:22px;
}
.quiz-progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2));transition:width .2s;}
.quiz-meta{display:flex;justify-content:space-between;color:var(--muted);font-size:12.5px;margin-bottom:10px;}
.quiz-question{
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:34px 24px;text-align:center;margin-bottom:20px;
}
.quiz-question .q-dir{font-size:11px;color:var(--accent);font-weight:800;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;}
.quiz-question .q-word{font-family:'Fraunces',serif;font-size:30px;font-weight:600;}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.q-option{
  background:var(--panel);border:1.5px solid var(--line);border-radius:11px;
  padding:14px 12px;text-align:center;cursor:pointer;font-size:14px;font-weight:600;transition:.12s;
}
.q-option:hover{border-color:var(--accent);}
.q-option.correct{background:rgba(76,175,125,0.18);border-color:var(--good);color:#a9e8c4;}
.q-option.wrong{background:rgba(224,96,90,0.18);border-color:var(--bad);color:#ffb3af;}
.q-option.disabled{pointer-events:none;opacity:.85;}
.quiz-next{display:flex;justify-content:center;margin-top:20px;}
.quiz-exit{text-align:center;margin-top:14px;}
.quiz-exit button{background:none;border:none;color:var(--muted);font-size:12.5px;cursor:pointer;text-decoration:underline;}

/* ---------- Result ---------- */
.result-wrap{max-width:520px;margin:0 auto;text-align:center;}
.result-score{
  font-family:'Fraunces',serif;font-size:56px;font-weight:700;margin:10px 0 4px;
  background:linear-gradient(160deg,var(--accent-2),var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent;
}
.result-label{color:var(--muted);font-size:14px;margin-bottom:26px;}
.result-list{text-align:left;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;margin-bottom:22px;}
.result-list h4{margin:0 0 10px;font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
.result-row{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13.5px;}
.result-row:last-child{border-bottom:none;}
.result-row .r-en{font-weight:700;}
.result-row .r-your{color:var(--bad);}
.result-row .r-correct{color:var(--good);}
.result-actions{display:flex;gap:10px;}

/* ---------- Saved lists (difficult / mistakes) ---------- */
.saved-list{display:flex;flex-direction:column;gap:8px;}
.saved-row{
  background:var(--panel);border:1px solid var(--line);border-radius:11px;
  padding:12px 14px;display:flex;align-items:center;gap:12px;
}
.saved-row .meta{font-size:10.5px;color:var(--muted);min-width:64px;}
.saved-row .word-en{min-width:110px;font-size:15px;}
.saved-row .word-uz{filter:none;opacity:1;font-size:13.5px;}
.saved-row .remove{
  background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px;
}
.saved-row .remove:hover{color:var(--bad);}
.empty-state{
  text-align:center;padding:50px 20px;color:var(--muted);
}
.empty-state .big{font-size:38px;margin-bottom:10px;}

/* ---------- misc ---------- */
.loader{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--muted);font-size:13px;}
.toast{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
  background:var(--panel-2);border:1px solid var(--line);color:var(--text);
  padding:10px 18px;border-radius:10px;font-size:13px;box-shadow:var(--shadow);
  z-index:100;opacity:0;pointer-events:none;transition:opacity .2s, transform .2s;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}

@media (max-width:640px){
  nav.tabs{position:fixed;bottom:0;left:0;right:0;background:rgba(17,19,28,0.95);backdrop-filter:blur(10px);
    border-top:1px solid var(--line);padding:6px 4px;justify-content:space-around;z-index:30;}
  nav.tabs button{flex:1;font-size:11px;padding:8px 4px;}
  main{padding-bottom:90px;}
  .spine{width:70px;height:190px;}
  .quiz-options{grid-template-columns:1fr;}
  .word-en{min-width:100px;font-size:15px;}
}
</style>
</head>
<body>
<div id="app">

  <header class="topbar" id="topbar">
    <div class="brand" onclick="Nav.go('shelf')">
      <div class="brand-mark">4K</div>
      <div>
        <div class="brand-title">So'zlar Kutubxonasi</div>
        <div class="brand-sub">4000 Essential English Words</div>
      </div>
    </div>
    <nav class="tabs hidden" id="tabs">
      <button data-tab="shelf" onclick="Nav.go('shelf')">📚 Kutubxona</button>
      <button data-tab="difficult" onclick="Nav.go('difficult')">⭐ Qiyin so'zlar</button>
      <button data-tab="mistakes" onclick="Nav.go('mistakes')">❌ Xatolarim</button>
    </nav>
    <div class="user-chip hidden" id="userChip">
      <span id="userEmail"></span>
      <button onclick="AuthUI.logout()">Chiqish</button>
    </div>
  </header>

  <main id="main">
    <div class="loader" id="globalLoader">Yuklanmoqda...</div>
  </main>

</div>

<div class="toast" id="toast"></div>

<!-- ============ TEMPLATES ============ -->

<template id="tpl-auth">
  <div class="auth-wrap">
    <div class="auth-hero">
      <div class="brand-mark">4K</div>
      <h1 id="authTitle">Xush kelibsiz</h1>
      <p>So'z boyligingizni oshiring — natijalaringiz saqlanadi</p>
    </div>
    <div class="auth-error hidden" id="authError"></div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="authEmail" placeholder="email@misol.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Parol</label>
      <input type="password" id="authPassword" placeholder="Kamida 6 ta belgi" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" id="authSubmit">Kirish</button>
    <div class="auth-divider">yoki</div>
    <button class="btn btn-ghost" id="authGoogle">Google orqali kirish</button>
    <div class="auth-switch" id="authSwitch">Hisobingiz yo'qmi? <span id="authSwitchLink">Ro'yhatdan o'ting</span></div>
    <div class="setup-note" id="setupNote"></div>
  </div>
</template>

<script type="module" src="app.js"></script>
</body>
</html>
